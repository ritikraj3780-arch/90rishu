<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a192f; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .card { background: white; color: #333; padding: 40px; border-radius: 20px; max-width: 400px; width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border-top: 10px solid #10b981; }
        .icon { font-size: 60px; color: #10b981; margin-bottom: 20px; }
        h1 { margin: 0; color: #0a192f; }
        p { color: #666; margin-top: 10px; line-height: 1.5; }
        .reg-id { background: #f3f4f6; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 1.2rem; color: #0a192f; margin: 20px 0; border: 2px dashed #ccc; }
        .btn { display: inline-block; background: #fbbf24; color: #0a192f; text-decoration: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✅</div>
        <h1>Payment Successful!</h1>
        <p>Welcome to 90+ Academy. Your registration is confirmed.</p>
        
        <div class="reg-id" id="showID">Generating ID...</div>
        
        <p style="font-size:0.8rem;">Admit Card will be sent to your WhatsApp shortly.</p>
        <a href="index.html" class="btn">Back to Home</a>

    <script>
        // Fake ID Generator for Visual Satisfaction
